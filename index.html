<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 اردو اقوال</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --border:rgba(34,197,94,0.35);
}

body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --text:#111827;
  --border:#22c55e;
}

body{
  margin:0;
  font-family:'Noto Nastaliq Urdu', serif;
  background:var(--bg);
  color:var(--text);
}

.main{padding:15px;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#menuBtn{
  font-size:22px;
  background:none;
  border:none;
  color:var(--text);
  cursor:pointer;
}

.title{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

#search{
  width:100%;
  margin:15px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* CARD */
.card{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:var(--card);
  border:1px solid var(--border);
  position:relative;
}

.text{
  margin-top:40px;
  line-height:2;
}

.actionBox{
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  gap:12px;
}

.actionBox button{
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  cursor:pointer;
}

/* DRAWER */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
}

#overlay.show{display:block;}

.drawer{
  position:fixed;
  top:0;
  right:0;
  width:220px;
  height:70%;
  background:#111827;
  border-radius:35px 0 0 35px;
  transform:translateX(100%);
  transition:0.35s;
  padding-top:60px;
}

.drawer.open{transform:translateX(0);}

#closeBtn{
  position:absolute;
  top:15px;
  left:15px;
  background:none;
  border:none;
  color:#22c55e;
  font-size:22px;
  cursor:pointer;
}

.menuItem{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  color:#22c55e;
  text-decoration:none;
}

#themeIcon,#musicIcon{
  transition:0.4s;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:#000;
  padding:10px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}

#toast.show{opacity:1;}
</style>
</head>

<body>

<div class="main">

  <div class="header">
    <button id="menuBtn" onclick="openDrawer()">☰</button>
    <div class="title">اردو اقوال</div>
  </div>

  <input id="search" placeholder="اقوال تلاش کریں..." oninput="searchQuotes()">

  <div id="container"></div>

</div>

<div id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <button id="closeBtn" onclick="closeDrawer()">✖</button>

  <a href="#" class="menuItem" onclick="showAll()">📜 تمام اقوال</a>
  <a href="#" class="menuItem" onclick="showFavs()">❤️ پسندیدہ</a>

  <a href="#" class="menuItem" onclick="toggleTheme()">
    <i id="themeIcon" class="fas fa-moon"></i> نائٹ موڈ
  </a>

  <a href="#" class="menuItem" onclick="toggleMusic()">
    <i id="musicIcon" class="fas fa-play"></i> میوزک
  </a>
  
<a href="https://gullnoor596-svg.github.io/Help-us/" target="_blank" class="menuItem">
  <i class="fas fa-headset"></i> سپورٹ
</a>

</div>

<div id="toast"></div>

<audio id="bgMusic" loop>
  <source src="https://github.com/gullnoor596-svg/Gullkhanwebserver/raw/main/Modern%20Talking%20-%20Cheri%20Cheri%20Lady%20(Lyrics)(720P_HD)(mp3).mp3">
</audio>

<script>

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

/* DATA */
const customQuotes = [
  {id:1, show:"زندگی خوبصورت ہے اگر سمجھ آ جائے", copy:"text 1"},
  {id:2, show:"خاموشی سب سے بڑا جواب ہے", copy:"text 2"}
];

const autoQuotes = Array.from({length:600},(_,i)=>({
  id:i+100,
  show:"یہ "+(i+1),
  copy:"text "+(i+1)
}));

const quotes = [...customQuotes, ...autoQuotes];

let favorites = JSON.parse(localStorage.getItem("favs")) || [];
let page = 1;
let limit = 20;
let mode = "all";

const container = document.getElementById("container");
const music = document.getElementById("bgMusic");
let playing = false;

/* RENDER */
function render(){
  container.innerHTML = "";

  let data = (mode==="fav")
    ? quotes.filter(q=>favorites.includes(q.id))
    : quotes;

  let visible = data.slice(0, page * limit);

  visible.forEach(q=>{
    let liked = favorites.includes(q.id);

    container.innerHTML += `
    <div class="card">
      <div class="actionBox">

    <button onclick='copyText(${JSON.stringify(q.copy)})'>📋</button>

        <button onclick="toggleLike(${q.id})">
          ${liked
            ? `<i class="fa-solid fa-heart" style="color:red;"></i>`
            : `<i class="fa-regular fa-heart"></i>`}
        </button>

      </div>

      <div class="text">${q.show}</div>
    </div>`;
  });

  if(visible.length < data.length){
    container.innerHTML += `
    <div style="text-align:center;margin:20px;">
      <button onclick="loadMore()">مزید لوڈ کریں</button>
    </div>`;
  }
}

/* FUNCTIONS */
function loadMore(){page++;render();}
function showAll(){mode="all";page=1;render();closeDrawer();}
function showFavs(){mode="fav";page=1;render();closeDrawer();}

function toggleLike(id){
  if(favorites.includes(id)){
    favorites = favorites.filter(f=>f!==id);
  }else{
    favorites.push(id);
  }
  localStorage.setItem("favs", JSON.stringify(favorites));
  render();
}

function copyText(t){
  navigator.clipboard.writeText(t);
  toast("کاپی ہو گیا");
}

function searchQuotes(){
  let val=document.getElementById("search").value.toLowerCase();
  container.innerHTML="";
  quotes.filter(q=>q.show.toLowerCase().includes(val))
  .forEach(q=>{
    container.innerHTML+=`<div class="card"><div class="text">${q.show}</div></div>`;
  });
}

/* THEME */
function toggleTheme(){
  let icon=document.getElementById("themeIcon");
  document.body.classList.toggle("light");

  if(document.body.classList.contains("light")){
    icon.className="fas fa-sun";
    localStorage.setItem("theme","light");
  }else{
    icon.className="fas fa-moon";
    localStorage.setItem("theme","dark");
  }
}

/* MUSIC */
function toggleMusic(){
  let icon=document.getElementById("musicIcon");

  if(playing){
    music.pause();
    icon.className="fas fa-play";
  }else{
    music.play();
    icon.className="fas fa-pause";
  }
  playing=!playing;
}

/* DRAWER */
function openDrawer(){
  drawer.classList.add("open");
  overlay.classList.add("show");
}
function closeDrawer(){
  drawer.classList.remove("open");
  overlay.classList.remove("show");
}

/* TOAST */
function toast(msg){
  let t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

render();

</script>

</body>
</html>
